name: Update packages

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Get package list
        id: packages
        run: |
          PACKAGES=$(nix flake show --json --all-systems | jq -c '
            [(.packages["x86_64-linux"] // {}) | keys[]] | sort
          ')
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "Packages: $PACKAGES"

  update-package:
    needs: discover-packages
    if: needs.discover-packages.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover-packages.outputs.packages) }}
    runs-on: ubuntu-latest
    concurrency:
      group: update-package-${{ matrix.package }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install nix-update
        run: nix profile install nixpkgs#nix-update

      - name: Update ${{ matrix.package }}
        id: update
        continue-on-error: true
        run: nix-update --flake "${{ matrix.package }}"

      - name: Create pull request
        if: steps.update.outcome == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/${{ matrix.package }}
          delete-branch: true
          title: "chore(${{ matrix.package }}): update package"
          commit-message: "chore(${{ matrix.package }}): update package"
          body: |
            Automated update of `${{ matrix.package }}` by [nix-update](https://github.com/Mic92/nix-update).

            Triggered by the [Update packages](https://github.com/${{ github.repository }}/actions/workflows/update-packages.yml) workflow.
          labels: |
            automated
            dependencies

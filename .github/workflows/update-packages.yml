name: Update packages

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: Version preference passed to nix-update
        type: choice
        options:
          - stable
          - unstable
        default: stable

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Get package list
        id: packages
        run: |
          PACKAGES=$(nix flake show --json --all-systems | jq -c '
            [(.packages["x86_64-linux"] // {}) | keys[]] | sort
          ')
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "Packages: $PACKAGES"

  update-package:
    needs: discover-packages
    if: needs.discover-packages.outputs.packages != '[]'
    env:
      VERSION: ${{ github.event.inputs.version || 'stable' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover-packages.outputs.packages) }}
    runs-on: ubuntu-latest
    concurrency:
      group: update-package-${{ matrix.package }}-${{ github.event.inputs.version || 'stable' }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install nix-update
        run: nix profile install nixpkgs#nix-update

      - name: Update ${{ matrix.package }}
        id: update
        continue-on-error: true
        run: |
          pkg='${{ matrix.package }}'
          # Packages with passthru.updateScript (e.g. multi-platform binary
          # wheels) need --use-update-script; plain nix-update only knows about
          # a single src.outputHash and may not recognise the upstream URL.
          if nix eval --json ".#${pkg}.passthru" \
            | jq -e 'has("updateScript")' >/dev/null; then
            nix-update --flake "$pkg" --use-update-script
          else
            nix-update --flake "$pkg" --version="$VERSION"
          fi

      - name: Create pull request
        if: steps.update.outcome == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/${{ matrix.package }}${{ env.VERSION == 'unstable' && '-unstable' || '' }}
          delete-branch: true
          title: "chore(${{ matrix.package }}): update package${{ env.VERSION == 'unstable' && ' (unstable)' || '' }}"
          commit-message: "chore(${{ matrix.package }}): update package${{ env.VERSION == 'unstable' && ' (unstable)' || '' }}"
          body: |
            Automated update of `${{ matrix.package }}` by [nix-update](https://github.com/Mic92/nix-update).

            Version preference: `${{ env.VERSION }}`

            Triggered by the [Update packages](https://github.com/${{ github.repository }}/actions/workflows/update-packages.yml) workflow.
          labels: |
            automated
            dependencies

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - system: x86_64-linux
            os: ubuntu-latest
          # Linux (aarch64)
          - system: aarch64-linux
            os: ubuntu-24.04-arm
          # macOS (aarch64)
          - system: aarch64-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Attic
        # `attic use` registers our cache as a Nix substituter and trusts its
        # signing key. nix-fast-build then queries it during --skip-cached, and
        # `attic push` is invoked by --attic-cache for newly built paths.
        run: |
          nix profile install 'nixpkgs#attic-client'
          attic login central ${{ secrets.ATTIC_ENDPOINT }} ${{ secrets.ATTIC_TOKEN }}
          attic use central:${{ secrets.ATTIC_CACHE }}

      - name: Nix flake show
        run: nix flake show --json --all-systems

      # nix-fast-build pipelines `nix-eval-jobs` with parallel builds and
      # narinfo lookups. With --skip-cached, any drvPath whose output is
      # already in the attic cache is bypassed entirely — no download, no
      # build — which is what makes per-package CI scale as the package count
      # grows. Successful builds are pushed back to attic via --attic-cache.
      #
      # --retries replaces the previous nick-fields/retry wrapper; cached
      # paths re-resolve instantly so retrying the whole step stays cheap.
      #
      # TODO: To quarantine specific packages, pass:
      #   --select '_: pkgs: removeAttrs pkgs [ "pkg-to-skip" ]'
      - name: Build & push uncached packages
        run: |
          nix profile install 'nixpkgs#nix-fast-build'
          nix-fast-build \
            --flake ".#packages.${{ matrix.system }}" \
            --skip-cached \
            --no-nom \
            --no-link \
            --retries 3 \
            --attic-cache "central:${{ secrets.ATTIC_CACHE }}"

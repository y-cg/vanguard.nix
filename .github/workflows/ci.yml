name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - system: x86_64-linux
            os: ubuntu-latest
          # Linux (aarch64)
          - system: aarch64-linux
            os: ubuntu-24.04-arm
          # macOS (aarch64)
          - system: aarch64-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install Devenv
        run: nix profile add github:cachix/devenv/v2.1.2 -L --accept-flake-config

      - name: Setup Attic
        run: |
          nix profile install 'nixpkgs#attic-client'
          attic login central ${{ secrets.ATTIC_ENDPOINT }} ${{ secrets.ATTIC_TOKEN }}
          attic use central:${{ secrets.ATTIC_CACHE }}

      - name: Nix flake show
        run: nix flake show --json --all-systems

      - name: Get package list
        id: packages
        shell: devenv shell bash -- -e {0}
        run: |
          # Keep this list small and intentional. Packages listed here stay
          # available in the flake, but CI will not try to build them until we
          # remove them from the quarantine list.
          SKIPPED_PACKAGES=()
          PACKAGES=$(list-ci-pkgs ${{ matrix.system }} "${SKIPPED_PACKAGES[@]}")
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Building packages: $PACKAGES"

      - name: Build all packages
        # nick-fields/retry wraps the whole build/push sequence. Cached packages
        # rebuild quickly, so re-running the loop on transient failure is cheap
        # and simpler than per-package retry logic in bash.
        uses: nick-fields/retry@v3
        with:
          max_attempts: 5
          retry_wait_seconds: 30
          timeout_minutes: 10
          command: |
            PACKAGES='${{ steps.packages.outputs.packages }}'
            for pkg in $(echo "$PACKAGES" | jq -r '.[]'); do
              echo "::group::Building $pkg"
              nix build ".#$pkg" --print-build-logs
              attic push central:${{ secrets.ATTIC_CACHE }} ./result
              echo "::endgroup::"
            done

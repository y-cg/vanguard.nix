name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64)
          - system: x86_64-linux
            os: ubuntu-latest
          # Linux (aarch64)
          - system: aarch64-linux
            os: ubuntu-24.04-arm
          # macOS (aarch64)
          - system: aarch64-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install Devenv
        run: nix profile add github:cachix/devenv/v1.11.2 -L --accept-flake-config

      - name: Setup Attic
        run: |
          nix profile install 'nixpkgs#attic-client'
          attic login central ${{ secrets.ATTIC_ENDPOINT }} ${{ secrets.ATTIC_TOKEN }}
          attic use central:${{ secrets.ATTIC_CACHE }}

      - name: Nix flake show
        run: nix flake show --json --all-systems

      - name: Get package list
        id: packages
        shell: devenv shell bash -- -e {0}
        run: |
          PACKAGES=$(list-pkgs ${{ matrix.system }})
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Building packages: $PACKAGES"

      - name: Build all packages
        run: |
          PACKAGES='${{ steps.packages.outputs.packages }}'
          max_attempts=5
          for pkg in $(echo "$PACKAGES" | jq -r '.[]'); do
            echo "::group::Building $pkg"
            attempt=1
            delay=2
            while true; do
              if nix build ".#$pkg" --print-build-logs; then
                break
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "nix build failed after $attempt attempts"
                exit 1
              fi
              echo "nix build failed, retrying in ${delay}s (attempt $((attempt + 1))/$max_attempts)"
              sleep "$delay"
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
            attempt=1
            delay=2
            while true; do
              if attic push central:${{ secrets.ATTIC_CACHE }} ./result; then
                break
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "attic push failed after $attempt attempts"
                exit 1
              fi
              echo "attic push failed, retrying in ${delay}s (attempt $((attempt + 1))/$max_attempts)"
              sleep "$delay"
              delay=$((delay * 2))
              attempt=$((attempt + 1))
            done
            echo "::endgroup::"
          done
